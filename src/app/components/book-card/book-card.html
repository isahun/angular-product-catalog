<section>
  <article class="book-card" [routerLink]="['/books', book().id]">
    <img src="{{ book().image }}" alt="{{ book().title }}" class="book-card-img">
    <div class="book-card-body">
      <h2>{{ book().title }}</h2>
      <p class="author">{{ book().author }}</p>
      <p class="price">{{ book().price | currency }}</p>
    </div>
      <button class="btn-primary mt-3 self-center mb-5">Ves al detall</button>
  </article>
</section>
