<section class="book-detail-page">
  @if (book(); as b) {
  <app-book-detail-card [book]="b" />
  <img src="{{ b.image }}" alt="{{ b.title }}" class="w-half md:w-1/3 h-auto object-cover rounded-lg">
    <br>
  <button class="btn-back" (click)="goBack()">← Tornar al catàleg</button>
  } @else {
  <p>Llibre no trobat.</p>
  <button class="btn-back" (click)="goBack()">← Tornar al catàleg</button>
  }
</section>
